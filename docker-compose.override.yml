# Docker Compose Override for Development
# This file is automatically loaded by Docker Compose in addition to docker-compose.yml
# It enables auto-reload for FastAPI and Celery services during development
#
# To disable this in production, use: docker-compose -f docker-compose.yml up

services:
  backend:
    command: sh -c "./prestart.sh && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - WATCHFILES_FORCE_POLLING=true  # Better file watching in Docker volumes
    volumes:
      - ./backend:/app
      # Exclude Python cache from sync to avoid permission issues
      - /app/__pycache__
      - /app/.pytest_cache

  worker:
    command: sh -c "celery -A app.tasks.celery_app worker --loglevel=info --pool=solo"
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache

  beat:
    command: sh -c "celery -A app.tasks.celery_app beat --loglevel=info"
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
